name: HouseMusic
options:
  bundleIdPrefix: org.whitelabel
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  developmentLanguage: en

packages:
  HouseMusicKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    WATCHOS_DEPLOYMENT_TARGET: "10.0"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 86H54WCPYP
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:

  HouseMusic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOS
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: App/Shared
    dependencies:
      - target: HouseMusicWatch
        embed: true
      - package: HouseMusicKit
        product: HouseMusicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.whitelabel.housemusic
        INFOPLIST_FILE: App/iOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/iOS/HouseMusic.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

  HouseMusicWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App/Watch
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: App/Shared
    dependencies:
      - package: HouseMusicKit
        product: HouseMusicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.whitelabel.housemusic.watchkitapp
        INFOPLIST_FILE: App/Watch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Watch/HouseMusicWatch.entitlements

schemes:
  HouseMusic:
    build:
      targets:
        HouseMusic: all
    run:
      config: Debug
    archive:
      config: Release

  HouseMusicWatch:
    build:
      targets:
        HouseMusicWatch: all
    run:
      config: Debug
    archive:
      config: Release
